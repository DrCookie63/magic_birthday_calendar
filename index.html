<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Birthday Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Jost', system-ui, sans-serif;
      background: #f5ede0;
      color: #2c1a12;
      min-height: 100vh;
      font-weight: 400;
    }

    header {
      background: linear-gradient(160deg, #c4967a 0%, #7a4a38 100%);
      color: #fdf5ec;
      padding: 2.5rem 1rem 2rem;
      text-align: center;
    }

    header h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2.8rem;
      font-weight: 600;
      font-style: italic;
      letter-spacing: 0.01em;
      margin-bottom: 0.5rem;
    }

    header p {
      font-family: 'Jost', sans-serif;
      font-size: 0.78rem;
      font-weight: 300;
      opacity: 0.85;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    main {
      max-width: 820px;
      margin: 2rem auto;
      padding: 0 1rem 3rem;
    }

    .card {
      background: #fdf9f3;
      border-radius: 14px;
      padding: 1.75rem;
      box-shadow: 0 2px 16px rgba(100,50,20,0.08);
      margin-bottom: 1.5rem;
      border: 1px solid #ecddc8;
    }

    /* ── Form ── */
    .form-row {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .form-group {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9a6a52;
    }

    input[type="date"],
    input[type="number"] {
      padding: 0.65rem 0.85rem;
      border: 1.5px solid #ddc9b4;
      border-radius: 8px;
      font-size: 1rem;
      font-family: 'Jost', inherit;
      color: #2c1a12;
      background: #fffbf6;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus {
      outline: none;
      border-color: #b07a65;
      box-shadow: 0 0 0 3px rgba(176,122,101,0.15);
    }

    .field-hint {
      font-size: 0.73rem;
      color: #a08068;
      letter-spacing: 0.02em;
    }

    .error-msg {
      font-size: 0.78rem;
      color: #a03020;
      min-height: 1rem;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.85rem;
      background: linear-gradient(160deg, #c4967a 0%, #7a4a38 100%);
      color: #fdf5ec;
      border: none;
      border-radius: 9px;
      font-size: 0.78rem;
      font-weight: 500;
      font-family: 'Jost', inherit;
      cursor: pointer;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover  { opacity: 0.88; }
    .btn:active { transform: scale(0.99); }

    /* ── Results ── */
    #results { display: none; }

    .section-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      font-style: italic;
      margin-bottom: 1rem;
      color: #2c1a12;
    }

    .notice {
      background: #f7e8d8;
      border-left: 3px solid #b07a65;
      border-radius: 0 8px 8px 0;
      padding: 0.7rem 1rem;
      font-size: 0.875rem;
      color: #5a3a28;
      margin-bottom: 1.25rem;
      line-height: 1.6;
    }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      padding: 0.6rem 0.9rem;
      background: #f3e8dc;
      font-weight: 500;
      color: #9a7060;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 2px solid #ddc9b4;
    }

    td {
      padding: 0.6rem 0.9rem;
      border-bottom: 1px solid #f0e4d4;
      color: #4a2e20;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fdf3e8; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .d0 { background: #f5e8d5; color: #7a4a1e; }  /* Sun — warm sand  */
    .d1 { background: #e4ecdc; color: #3e5a2a; }  /* Mon — sage       */
    .d2 { background: #dce6ed; color: #2a4a60; }  /* Tue — dusty slate*/
    .d3 { background: #ece4ed; color: #5a3a6a; }  /* Wed — soft plum  */
    .d4 { background: #f5ddd8; color: #7a2e28; }  /* Thu — dusty blush*/
    .d5 { background: #f0e4d0; color: #6a4018; }  /* Fri — warm amber */
    .d6 { background: #dceae8; color: #28564e; }  /* Sat — muted teal */

    /* ── Histogram ── */
    .chart-container {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 180px;
    }

    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      gap: 4px;
    }

    .bar-value {
      font-size: 0.72rem;
      font-weight: 600;
      color: #7a5a4a;
      min-height: 1rem;
    }

    .bar {
      width: 100%;
      background: linear-gradient(to top, #b07a65, #d4a888);
      border-radius: 5px 5px 0 0;
      transition: height 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    .bar.zero { background: #ddc9b4; border-radius: 5px; min-height: 4px; }

    .chart-axis {
      border-top: 2px solid #ddc9b4;
    }

    .chart-labels {
      display: flex;
      gap: 6px;
    }

    .chart-label {
      flex: 1;
      text-align: center;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #9a7060;
      padding-top: 4px;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      header h1 { font-size: 2rem; }
      .chart    { height: 130px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Magic Birthday Calendar</h1>
  <p>See what day of the week your birthday lands on, year by year</p>
</header>

<main>
  <div class="card">
    <form id="form" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="birthday">Your Birthday</label>
          <input type="date" id="birthday" required>
          <span class="field-hint">Enter the month and day (year doesn't matter)</span>
          <span class="error-msg" id="bday-error"></span>
        </div>
        <div class="form-group">
          <label for="years">Years to Look Ahead</label>
          <input type="number" id="years" min="1" max="100" value="10" required>
          <span class="field-hint">Between 1 and 100 years</span>
          <span class="error-msg" id="years-error"></span>
        </div>
      </div>
      <button type="submit" class="btn">Calculate</button>
    </form>
  </div>

  <div id="results">
    <div class="card">
      <p class="notice" id="notice"></p>
      <p class="section-title">Birthday Days by Year</p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Year</th>
              <th>Date</th>
              <th>Day of Week</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <p class="section-title">Day of Week Distribution</p>
      <div class="chart-container">
        <div class="chart" id="chart"></div>
        <div class="chart-axis"></div>
        <div class="chart-labels" id="chart-labels"></div>
      </div>
    </div>
  </div>
</main>

<script>
  const DAYS  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  function isLeapYear(y) {
    return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;
  }

  function validate() {
    const bdayVal  = document.getElementById('birthday').value;
    const yearsVal = document.getElementById('years').value;
    let ok = true;

    document.getElementById('bday-error').textContent  = '';
    document.getElementById('years-error').textContent = '';

    if (!bdayVal) {
      document.getElementById('bday-error').textContent = 'Please enter your birthday.';
      ok = false;
    }

    const y = parseInt(yearsVal, 10);
    if (!yearsVal || isNaN(y) || y < 1 || y > 100) {
      document.getElementById('years-error').textContent = 'Please enter a number between 1 and 100.';
      ok = false;
    }

    return ok;
  }

  document.getElementById('form').addEventListener('submit', function (e) {
    e.preventDefault();
    if (!validate()) return;

    const [, m, d] = document.getElementById('birthday').value.split('-').map(Number);
    const years    = parseInt(document.getElementById('years').value, 10);
    const isLeapDay = m === 2 && d === 29;
    const startYear = new Date().getFullYear();

    const rows    = [];
    const counts  = new Array(7).fill(0);

    for (let i = 0; i < years; i++) {
      const yr = startYear + i;
      if (isLeapDay && !isLeapYear(yr)) continue;

      // Use UTC noon to avoid any DST boundary issues
      const dt  = new Date(Date.UTC(yr, m - 1, d, 12));
      const dow = dt.getUTCDay();
      counts[dow]++;
      rows.push({ yr, m, d, dow });
    }

    render(rows, counts, years, isLeapDay, startYear);
  });

  function render(rows, counts, yearsRequested, isLeapDay, startYear) {
    const endYear = startYear + yearsRequested - 1;
    const shown   = rows.length;
    const skipped = yearsRequested - shown;

    let notice = `Showing <strong>${shown}</strong> birthdays from <strong>${startYear}</strong> to <strong>${endYear}</strong>.`;
    if (isLeapDay && skipped > 0) {
      notice += `&ensp;&#x26A0;&#xFE0F;&nbsp;${skipped} non-leap year${skipped !== 1 ? 's' : ''} skipped — Feb 29 only exists in leap years.`;
    }
    document.getElementById('notice').innerHTML = notice;

    // Table
    document.getElementById('table-body').innerHTML = rows.map(r => `
      <tr>
        <td>${r.yr}</td>
        <td>${MONTHS[r.m - 1]} ${r.d}, ${r.yr}</td>
        <td><span class="badge d${r.dow}">${DAYS[r.dow]}</span></td>
      </tr>
    `).join('');

    // Histogram
    const maxCount = Math.max(...counts, 1);
    const chart  = document.getElementById('chart');
    const labels = document.getElementById('chart-labels');
    chart.innerHTML  = '';
    labels.innerHTML = '';

    for (let i = 0; i < 7; i++) {
      const c   = counts[i];
      const pct = (c / maxCount) * 100;

      const col = document.createElement('div');
      col.className = 'bar-col';
      col.innerHTML = `
        <span class="bar-value">${c > 0 ? c : ''}</span>
        <div class="bar${c === 0 ? ' zero' : ''}" style="height:${Math.max(pct, c === 0 ? 2 : 4)}%"></div>
      `;
      chart.appendChild(col);

      const lbl = document.createElement('div');
      lbl.className   = 'chart-label';
      lbl.textContent = SHORT[i];
      labels.appendChild(lbl);
    }

    document.getElementById('results').style.display = 'block';
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>

</body>
</html>
